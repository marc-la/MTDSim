- id: c1
  kind: condition
  description: The attacker discovers a process running under the user EgleAdmin on
    the computer
- id: c2
  kind: condition
  description: The communications to the C2 server are contained in a .eml file in
    the C:\Program Files\Microsoft\Exchange Server\V15\TransportRoles\Pickup\ directory
- id: c3
  kind: condition
  description: The user browses to a website
- id: c4
  kind: condition
  description: The Snake Installer (gusbsys.exe) successfully elevates privileges
    to SYSTEM using CVE-2021-1732
- id: c5
  kind: condition
  description: User logs off and back in to the system, executing the persistence
    mechanism
- id: c6
  kind: condition
  description: Attacker identifies ZilvinasAdmin in the list of accounts
- id: c7
  kind: condition
  description: Attacker discovers processes running under ZilvinasAdmin
- id: c8
  kind: condition
  description: Attacker identifies Zilvinas and ZilvinasAdmin
- id: c9
  kind: condition
  description: The Snake rootkit receives tasking from the C2 server
- id: c10
  kind: condition
  description: On UOSIS, msnsvcx64.dll is still injected into taskhostw.exe and msedge.exe
- id: c11
  kind: condition
  description: Attacker discovers Zilvinas' Workstation on UOSIS
- id: c12
  kind: condition
  description: On BERZAS, msnsvcx64.dll is still injected into taskhostw.exe and msedge.exe
- id: c13
  kind: condition
  description: The browser JavaScript fingerprints the target machine in the background
    and installs an evercookie
- id: c14
  kind: condition
  description: Attacker discovers that EgleAdmin is a member of the File Server Admins
    group
- id: c15
  kind: condition
  description: Attacker identifies an Active Directory group named Server Management
- id: c16
  kind: condition
  description: Attacker discovers the password and NTLM hash for ZilvinasAdmin
- id: c17
  kind: condition
  description: Attacker discovers the home drive is mapped to a file server
- id: c18
  kind: condition
  description: Attacker has established a watering hole targeting the user
- id: c19
  kind: condition
  description: LightNeuron's Transport Agent passes emails to its Companion DLL (exdbdata.dll)
    for further analysis
