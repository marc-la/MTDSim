- id: c1
  kind: condition
  description: The Loader DLL (mressvc.dll) runs as a service and executes the Orchestrator
    DLL (MSSVCCFG.dll). svchost.exe injects the communications DLL (msxhlp.dll) into
    msedge.exe.
- id: c2
  kind: condition
  description: The attacker identifies the domain controller and several domain administrator
    accounts, including frieda
- id: c3
  kind: condition
  description: Adalwolfa's SSH credentials are collected and exfiltrated
- id: c4
  kind: condition
  description: The attacker identifies a custom service, ViperVPN, that has a weak
    registry permission
- id: c5
  kind: condition
  description: The C2 server responds with a UUID for EPIC to save for future communications.
    Future communications with this C2 server are also bzip2 compressed and base64
    encoded.
- id: c6
  kind: condition
  description: HTML is appended to the webpage previously edited by Adalwolfa that
    contains script tags to load another JavaScript file
- id: c7
  kind: condition
  description: Adalwolfa is logged in to their workstation and opens the Edge browser.
    Mimikatz reveals a cached NTLM hash for the admin user Adalwolfa.
- id: c8
  kind: condition
  description: When the scheduled task is executed, the attacker successfully moves
    to BANNIK, where the user has opened a browser (msedge.exe)
- id: c9
  kind: condition
  description: User clicks on the spearphishing link and a fake update executable
    is downloaded
- id: c10
  kind: condition
  description: The service is restarted, executing the EPIC Injector (mxs_installer.exe)
    with SYSTEM level privileges. Using SYSTEM level privileges, EPIC injects into
    svchost.exe processes.
- id: c11
  kind: condition
  description: User logs off and back in to the system, executing the persistence
    mechanism
- id: c12
  kind: condition
  description: cron is reloaded and restarted
- id: c13
  kind: condition
  description: The attacker identifies an Apache web server and the workstation of
    the administrator of the Apache web server (Adalwolfa)
- id: c14
  kind: condition
  description: PENQUIN (/tmp/tmp514f524f) is unzipped into /root/hsperfdata
