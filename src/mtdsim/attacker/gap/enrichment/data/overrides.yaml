# Manual MITRE-group motivation overrides. Takes precedence over MISP/ETDA.
#
# Keys are MITRE external group IDs (G####). Motivation values must be drawn
# from the ETDA 4-category taxonomy defined in schema.MOTIVATION_CATEGORIES:
#   - information_theft_espionage
#   - financial_gain
#   - financial_crime
#   - sabotage_destruction
#
# Notes:
# - This file is hand-curated from MITRE group description free-text and public
#   vendor reporting (Mandiant, Microsoft, CrowdStrike). Lines that list
#   multiple motivations mean the group is multi-motivated.
# - Unattributed groups remain in the GAP; they just won't appear in
#   motivation-filtered views until added here or matched via MISP.

